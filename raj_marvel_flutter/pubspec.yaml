name: raj_marvel_app
description: Raj Marvel Exterior Designs - Premium Architecture App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # Networking
  dio: ^5.4.3+1
  
  # Storage
  shared_preferences: ^2.2.3
  
  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  
  # URL Launcher
  url_launcher: ^6.3.0
  
  # PDF viewer
  flutter_pdfview: ^1.3.2
  
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
